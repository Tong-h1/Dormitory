{% extends "base.html" %}
{% block title %}{% if is_edit %}编辑{% else %}添加{% endif %}学生{% endblock %}
{% block content %}
<div class="card">
    <h2>{% if is_edit %}编辑学生信息{% else %}添加学生{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-row">
            <div class="form-group"><label>学号</label><input name="student_id" required value="{{ student.student_id|default:"" }}"></div>
            <div class="form-group"><label>姓名</label><input name="name" required value="{{ student.name|default:"" }}"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>性别</label>
                <select name="gender">
                    <option value="男" {% if is_edit and student.gender == "男" %}selected{% endif %}>男</option>
                    <option value="女" {% if is_edit and student.gender == "女" %}selected{% endif %}>女</option>
                </select>
            </div>
            <div class="form-group"><label>电话</label><input name="phone" value="{{ student.phone|default:"" }}"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>院系</label><input name="department" value="{{ student.department|default:"" }}"></div>
            <div class="form-group"><label>专业</label><input name="major" value="{{ student.major|default:"" }}"></div>
        </div>
        <div class="form-group"><label>入学年份</label><input name="enrollment_year" type="number" value="{{ student.enrollment_year|default:"" }}"></div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{% url 'student_list' %}" class="btn" style="background:#aaa;color:#fff;">取消</a>
    </form>
</div>
{% endblock %}
