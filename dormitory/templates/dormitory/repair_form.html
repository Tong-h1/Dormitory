{% extends "base.html" %}
{% block title %}{% if is_edit %}处理报修{% else %}提交报修{% endif %}{% endblock %}
{% block content %}
<div class="card">
    <h2>{% if is_edit %}处理报修{% else %}提交报修{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        {% if not is_edit %}
        <div class="form-group"><label>宿舍</label>
            <select name="dormitory" required>
                <option value="">-- 请选择 --</option>
                {% for d in dormitories %}<option value="{{ d.id }}">{{ d }}</option>{% endfor %}
            </select>
        </div>
        <div class="form-group"><label>报修人</label><input name="reporter_name" required></div>
        <div class="form-group"><label>问题描述</label><textarea name="description" required></textarea></div>
        {% else %}
        <div class="form-group"><label>宿舍</label><input value="{{ repair.dormitory }}" disabled style="background:#f5f5f5;"></div>
        <div class="form-group"><label>报修人</label><input value="{{ repair.reporter_name }}" disabled style="background:#f5f5f5;"></div>
        <div class="form-group"><label>问题描述</label><textarea disabled style="background:#f5f5f5;">{{ repair.description }}</textarea></div>
        <div class="form-group"><label>状态</label>
            <select name="status">
                <option value="pending" {% if repair.status == "pending" %}selected{% endif %}>待处理</option>
                <option value="processing" {% if repair.status == "processing" %}selected{% endif %}>处理中</option>
                <option value="completed" {% if repair.status == "completed" %}selected{% endif %}>已完成</option>
            </select>
        </div>
        <div class="form-group"><label>处理人</label><input name="handler" value="{{ repair.handler|default:"" }}"></div>
        <div class="form-group"><label>处理备注</label><textarea name="note">{{ repair.note|default:"" }}</textarea></div>
        {% endif %}
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{% url 'repair_list' %}" class="btn" style="background:#aaa;color:#fff;">取消</a>
    </form>
</div>
{% endblock %}
