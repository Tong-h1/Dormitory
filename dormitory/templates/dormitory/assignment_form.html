{% extends "base.html" %}
{% block title %}住宿分配{% endblock %}
{% block content %}
<div class="card">
    <h2>📋 分配住宿</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group"><label>选择学生</label>
            <select name="student" required>
                <option value="">-- 请选择 --</option>
                {% for s in students %}<option value="{{ s.id }}">{{ s.name }}({{ s.student_id }}) - {{ s.department|default:"-" }}</option>{% endfor %}
            </select>
        </div>
        <div class="form-group"><label>选择宿舍</label>
            <select name="dormitory" required>
                <option value="">-- 请选择 --</option>
                {% for d in dormitories %}<option value="{{ d.id }}">{{ d }} ({{ d.current_count }}/{{ d.capacity }}人)</option>{% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-success">确认分配</button>
        <a href="{% url 'assignment_list' %}" class="btn" style="background:#aaa;color:#fff;">取消</a>
    </form>
</div>
{% endblock %}
