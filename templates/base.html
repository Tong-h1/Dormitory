<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}宿舍管理系统{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f0f2f5; color: #333; }
        .topbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .topbar h1 { font-size: 18px; font-weight: 600; }
        .topbar a { color: #fff; text-decoration: none; font-size: 14px; }
        .topbar .user-info span { margin-right: 16px; font-size: 13px; opacity: 0.9; }
        .layout { display: flex; min-height: calc(100vh - 56px); }
        .sidebar { width: 220px; background: #fff; padding: 16px 0; box-shadow: 2px 0 8px rgba(0,0,0,0.06); }
        .sidebar a { display: block; padding: 12px 24px; color: #555; text-decoration: none; font-size: 14px; transition: all 0.2s; border-left: 3px solid transparent; }
        .sidebar a:hover, .sidebar a.active { background: #f0f2ff; color: #667eea; border-left-color: #667eea; }
        .main { flex: 1; padding: 24px; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 20px; }
        .card h2 { font-size: 16px; margin-bottom: 16px; color: #444; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-item { background: #fff; border-radius: 8px; padding: 20px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .stat-item .num { font-size: 32px; font-weight: 700; color: #667eea; }
        .stat-item .label { font-size: 13px; color: #888; margin-top: 4px; }
        .btn { display: inline-block; padding: 8px 20px; border-radius: 6px; text-decoration: none; font-size: 14px; border: none; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #667eea; color: #fff; }
        .btn-primary:hover { background: #5a6fd6; }
        .btn-success { background: #52c41a; color: #fff; }
        .btn-danger { background: #ff4d4f; color: #fff; }
        .btn-warning { background: #faad14; color: #fff; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 600; color: #555; }
        tr:hover { background: #fafafa; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #555; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; outline: none; transition: border 0.2s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.2); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .messages { margin-bottom: 16px; }
        .msg { padding: 10px 16px; border-radius: 6px; margin-bottom: 8px; font-size: 14px; }
        .msg.success { background: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; }
        .msg.error { background: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f; }
        .search-box { margin-bottom: 16px; display: flex; gap: 12px; align-items: center; }
        .search-box input { padding: 6px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; width: 240px; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .badge-pending { background: #fff7e6; color: #d46b08; }
        .badge-processing { background: #e6f7ff; color: #096dd9; }
        .badge-completed { background: #f6ffed; color: #389e0d; }
        .pagination { margin-top: 16px; text-align: center; }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>🏠 宿舍住宿管理系统</h1>
        <div class="user-info">
            {% if user.is_authenticated %}
                <span>👤 {{ user.username }}</span>
                <a href="{% url 'logout' %}">退出登录</a>
            {% else %}
                <a href="{% url 'login' %}">登录</a>
            {% endif %}
        </div>
    </div>
    <div class="layout">
        {% if user.is_authenticated %}
        <div class="sidebar">
            <a href="{% url 'index' %}" class="{% if request.resolver_match.url_name == 'index' %}active{% endif %}">📊 系统首页</a>
            <a href="{% url 'building_list' %}" class="{% if 'building' in request.path %}active{% endif %}">🏢 宿舍楼管理</a>
            <a href="{% url 'dormitory_list' %}" class="{% if 'dormitor' in request.path %}active{% endif %}">🚪 房间管理</a>
            <a href="{% url 'student_list' %}" class="{% if 'student' in request.path %}active{% endif %}">👨‍🎓 学生管理</a>
            <a href="{% url 'assignment_list' %}" class="{% if 'assignment' in request.path %}active{% endif %}">📋 住宿分配</a>
            <a href="{% url 'repair_list' %}" class="{% if 'repair' in request.path %}active{% endif %}">🔧 报修管理</a>
        </div>
        {% endif %}
        <div class="main">
            {% if messages %}
            <div class="messages">
                {% for msg in messages %}
                <div class="msg {{ msg.tags }}">{{ msg }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
